services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:8080
        - SELF_HOSTED_MODE=true
    ports:
      - "7331:7331"
    environment:
      - NODE_ENV=production
      - SELF_HOSTED_MODE=true
      - UPLOAD_PATH=/app/data/uploads
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/db_invoice
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8080
      - BACKEND_INTERNAL_URL=http://backend:8080
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db_invoice
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backendNew
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    # Just wait for ollama to start, not health — backend retries via restart anyway
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_PARALLEL=1
    # Model is already pulled and cached in ollama_data volume —
    # pull is instant on subsequent starts, slow only on first run
    entrypoint: >
      sh -c "ollama serve &
             sleep 10 &&
             ollama pull qwen2.5:0.5b &&
             wait"

volumes:
  ollama_data: